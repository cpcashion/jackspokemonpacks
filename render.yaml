services:
  - type: web
    name: jackspokemonpacks
    runtime: docker
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 3000
      - key: SCAN_INTERVAL_MINUTES
        value: 3
    disk:
      name: pokesniper-db
      mountPath: /app/data
      sizeGB: 1
